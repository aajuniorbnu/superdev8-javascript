<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor</title>
    <link rel="stylesheet" href="/assets/css/conversor.css">
</head>
<body>
    <h1>Conversor de Moedas</h1>
    <label for="valor">Valor em Reais:</label><br>
    <input type="number" id="valor" placeholder="Digite o valor em R$"></input><br><br>
    <label for="moeda">Converter para:</label><br>
    <select id="moeda">
        <option value="">Selecione</option>
        <option value="dólar">Dólar</option>
        <option value="euro">Euro</option>
        <option value="libra">Libra</option>
        <option value="iene">Iene</option>
        <option value="franco-suico"> Franco-Suico</option>
        <option value="peso-argentino"> Peso-Argentino</option>
        <option value="yuan-chines"> Yuan Chinês</option>
    </select><br><br>
    <button id="converter">Converter</button><br><br>
    <div id="resultado"></div>
    


</body>
<script src="/assets/js/conversor-moedas.js"></script>
</html>
